<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Quiz Platform</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:800px;
}

.hidden{
    display:none;
}

#startScreen,
#dashboardScreen,
#branchScreen,
#subjectScreen,
#quizScreen,
#resultScreen{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
}

h1,h2,h3{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    padding:12px 20px;
    margin:8px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

.dashboard-box{
    background:#f8fafc;
    padding:20px;
    border-radius:10px;
    margin:20px 0;
}

.top{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.progress-bar{
    width:100%;
    height:10px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:20px;
}

#progressBar{
    width:0%;
    height:100%;
    background:#2563eb;
}

.options label{
    display:block;
    text-align:left;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    cursor:pointer;
}

.certificate{
    padding:20px;
}

#timer{
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

```
<!-- LOGIN -->

<div id="startScreen">

    <h1>🎓 Online Quiz Platform</h1>

    <input type="text" id="username" placeholder="Enter Username">

    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="signup()">Sign Up</button>

    <button onclick="login()">Login</button>

    <p id="authMessage"></p>

</div>

<!-- DASHBOARD -->

<div id="dashboardScreen" class="hidden">

    <h1>👋 Welcome</h1>

    <h2 id="dashboardUser"></h2>

    <div class="dashboard-box">

        <p>📚 Total Categories : 3</p>

        <p id="lastScore">🏆 Last Score : 0</p>

        <p id="bestScore">⭐ Best Score : 0</p>

    </div>

    <button onclick="openCategories()">
        Start Quiz
    </button>

    <button onclick="logoutUser()">
        Logout
    </button>

</div>

<!-- BRANCH -->

<div id="branchScreen" class="hidden">

    <h2>Select Branch</h2>

    <button onclick="selectBranch('CSE')">CSE</button>

    <button onclick="selectBranch('ECE')">ECE</button>

    <button onclick="selectBranch('EEE')">EEE</button>

</div>

<!-- SUBJECT -->

<div id="subjectScreen" class="hidden">

    <h2 id="branchTitle"></h2>

    <div id="subjectButtons"></div>

</div>

<!-- QUIZ -->

<div id="quizScreen" class="hidden">

    <div class="top">

        <span id="progressText"></span>

        <span id="timer">⏱ 15s</span>

    </div>

    <div class="progress-bar">

        <div id="progressBar"></div>

    </div>

    <h3 id="categoryTitle"></h3>

    <h2 id="question"></h2>

    <div class="options">

        <label>
            <input type="radio" name="answer" id="a">
            <span id="a_text"></span>
        </label>

        <label>
            <input type="radio" name="answer" id="b">
            <span id="b_text"></span>
        </label>

        <label>
            <input type="radio" name="answer" id="c">
            <span id="c_text"></span>
        </label>

        <label>
            <input type="radio" name="answer" id="d">
            <span id="d_text"></span>
        </label>

    </div>

    <button onclick="submitAnswer()">
        Submit
    </button>

</div>

<!-- RESULT -->

<div id="resultScreen" class="hidden"></div>
```

</div>

<script src="script.js"></script>

</body>
</html>
